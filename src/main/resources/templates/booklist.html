<!DOCTYPE HTML>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <title>Booklist</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        
        <div class="d-flex justify-content-between align-items-center mb-3 mt-3">
            <h3>Welcome, <span sec:authentication="name"></span>!</h3> <form th:action="@{/logout}" method="post"> <input type="submit" value="Sign Out" class="btn btn-sm btn-outline-danger"/>
            </form>
        </div>
        
        <h1>Books</h1>
        
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Author</th>
                    <th>Title</th>
                    <th>ISBN</th>
                    <th>Year</th>
                    <th>Category</th> 
                    
                    <th sec:authorize="hasRole('ADMIN')"></th> 
                    <th></th> </tr>  
            </thead>
            <tbody>
                <tr th:each="book : ${books}">
                    <td th:text="${book.author}"></td>
                    <td th:text="${book.title}"></td>
                    <td th:text="${book.isbn}"></td>
                    <td th:text="${book.publicationYear}"></td>
                    <td th:text="${book.category != null} ? ${book.category.name} : '-'"></td>
                    
                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/delete/{id}(id=${book.id})}" class="btn btn-danger">Delete</a>
                    </td> 
                    
                    <td><a th:href="@{/edit/{id}(id=${book.id})}" class="btn btn-primary">Edit</a></td>          
                </tr>
            </tbody>
         </table>
         
         <a href="/add" class="btn btn-success">Add Book</a>     
    </div>
</body>
</html>
